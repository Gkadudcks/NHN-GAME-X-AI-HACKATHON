<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="정직원 전환 PT를 둘러싼 오피스 럽코 추리 게임" />
  <title>최종본이 바뀌었습니다 | NAN</title>
  <link rel="stylesheet" href="css/title-screen.css" />
</head>
<body>
  <main class="title-screen">
    <header class="system-bar">
      <span class="brand"><strong>NAN</strong> OFFICE SYSTEM</span>
      <span class="story-time"><i></i> DAY 1 · 08:47</span>
    </header>

    <section class="title-content" aria-labelledby="game-title">
      <p class="genre">OFFICE ROMANCE × MYSTERY</p>
      <h1 id="game-title">최종본이 바뀌었습니다</h1>
      <p class="deadline">정직원 전환까지 <strong>D-5</strong></p>
      <p class="tagline">회사에서 살아남으려고 했는데,<br />어느새 그녀와 함께 오해를 풀고 있었다.</p>
    </section>

    <nav class="game-menu" aria-label="게임 메뉴">
      <button class="menu-button active" data-action="new-game">
        <span class="number">01</span><span>새 게임</span><span class="arrow">›</span>
      </button>
      <button class="menu-button" data-action="continue">
        <span class="number">02</span><span>이어하기</span><span class="arrow">›</span>
      </button>
      <button class="menu-button" data-action="records">
        <span class="number">03</span><span>기록</span><span class="arrow">›</span>
      </button>
      <button class="menu-button" data-action="settings">
        <span class="number">04</span><span>설정</span><span class="arrow">›</span>
      </button>
    </nav>

    <section class="save-panel" aria-labelledby="save-panel-title" aria-hidden="true">
      <div class="save-dialog">
        <header class="save-header">
          <div>
            <p>CONTINUE</p>
            <h2 id="save-panel-title">저장된 기록</h2>
          </div>
          <button class="close-save-panel" type="button" aria-label="저장 슬롯 닫기">×</button>
        </header>
        <div class="save-slots" aria-label="저장 슬롯 목록"></div>
        <p class="save-help">불러올 슬롯을 선택하세요. 저장 데이터는 이 브라우저에 보관됩니다.</p>
      </div>
    </section>

    <footer class="controls">
      <span>↑↓ 선택</span><span>ENTER 확인</span><span class="copyright">© NAN TEAM</span>
    </footer>

    <section class="start-overlay" aria-hidden="true">
      <p>DAY 1</p><strong>정직원 전환 과제</strong>
    </section>
  </main>
  <script src="js/title-screen.js"></script>
</body>
</html>
